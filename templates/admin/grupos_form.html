{% extends "base.html" %}
{% block title %}{{ 'Editar' if grupo else 'Novo' }} Grupo{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="card shadow-sm">
      <div class="card-header bg-success text-white fw-bold">
        <i class="bi bi-collection"></i>
        {{ 'Editar Grupo' if grupo else 'Novo Grupo' }}
      </div>
      <div class="card-body">
        <form method="post">
          <div class="mb-3">
            <label class="form-label fw-bold">Nome <span class="text-danger">*</span></label>
            <input type="text" name="nome" class="form-control" required
                   value="{{ grupo.nome if grupo else '' }}">
            <small class="text-muted">Escolha um nome único para identificar o grupo.</small>
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">Descrição</label>
            <textarea name="descricao" class="form-control" rows="3"
                      placeholder="ex: Grupo de amigos da empresa...">{{ grupo.descricao if grupo else '' }}</textarea>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-success"><i class="bi bi-check-lg"></i> Salvar</button>
            <a href="{{ url_for('listar_grupos') }}" class="btn btn-outline-secondary">Cancelar</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
