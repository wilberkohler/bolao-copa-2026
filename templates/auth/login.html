<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#198754">
  <link rel="manifest" href="{{ url_for('manifest_webmanifest') }}">
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='icons/icon.svg') }}">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/icon.svg') }}">
  <title>Login - Bolão Copa 2026</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, #198754 0%, #0d5132 100%); }
    .login-container { width: 100%; max-width: 400px; }
    .card { border: none; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
    .btn-login { background: #198754; border: none; font-weight: 600; padding: 10px 20px; }
    .btn-login:hover { background: #0d5132; }
  </style>
</head>
<body>

<div class="login-container">
  <div class="card">
    <div class="card-body p-5">
      <div class="text-center mb-4">
        <h1 class="display-6 mb-2"><i class="bi bi-trophy-fill text-success"></i></h1>
        <h2 class="h4">Bolão Copa 2026</h2>
        <p class="text-muted">Sistema de Palpites</p>
      </div>

      {% with msgs = get_flashed_messages(with_categories=true) %}
        {% for cat, msg in msgs %}
          <div class="alert alert-{{ cat }} alert-dismissible fade show" role="alert">
            {{ msg }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>
        {% endfor %}
      {% endwith %}

      <form method="post">
        <div class="mb-3">
          <label class="form-label fw-bold">E-mail</label>
          <input type="email" name="email" class="form-control" required autofocus>
        </div>
        <div class="mb-4">
          <label class="form-label fw-bold">Senha</label>
          <input type="password" name="senha" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-login w-100 mb-3">
          <i class="bi bi-box-arrow-in-right"></i> Entrar
        </button>
      </form>

      <hr>
      <p class="text-center text-muted mb-0">
        Ainda não tem conta? <a href="{{ url_for('registro') }}" class="fw-bold text-decoration-none text-success">Cadastre-se aqui</a>
      </p>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function () {
      navigator.serviceWorker.register("/service-worker.js").catch(function (err) {
        console.log("Service worker registration failed:", err);
      });
    });
  }
</script>
</body>
</html>
